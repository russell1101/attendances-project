status = warn
appenders = console, rolling, audit
loggers = hibernate, audit
# custom property. ${sys:catalina.home} is Tomcat root path
property.basePath=${sys:catalina.home}/log

# set ConsoleAppender
appender.console.type=Console
appender.console.name=consoleAppender
appender.console.layout.type=PatternLayout
appender.console.layout.pattern=%d{yyyy-MM-dd HH:mm:ss.SSS} [%level] [%t] [%l] %msg%n

# set RollingFileAppender
appender.rolling.type=RollingFile
appender.rolling.name=fileAppender
appender.rolling.layout.type=PatternLayout
appender.rolling.layout.pattern=%d{yyyy-MM-dd HH:mm:ss.SSS} [%level] [%t] [%l] %msg%n

appender.rolling.fileName=${basePath}/app.log
appender.rolling.filePattern=${basePath}/app_%d{yyyyMMdd}-%i.log.gz
appender.rolling.policies.type=Policies
appender.rolling.policies.size.type=SizeBasedTriggeringPolicy
appender.rolling.policies.size.size=10MB
appender.rolling.policies.time.type=TimeBasedTriggeringPolicy
appender.rolling.policies.time.interval=1
appender.rolling.policies.time.modulate=true
appender.rolling.strategy.type=DefaultRolloverStrategy
appender.rolling.strategy.max=50
appender.rolling.strategy.delete.type=Delete
appender.rolling.strategy.delete.basePath=${basePath}
appender.rolling.strategy.delete.maxDepth=10
appender.rolling.strategy.delete.ifLastModified.type=IfLastModified
appender.rolling.strategy.delete.ifLastModified.age=30d

# dblogger
appender.audit.type=RollingFile
appender.audit.name=auditAppender
appender.audit.fileName=${basePath}/db_audit.log
appender.audit.filePattern=${basePath}/db_audit_%d{yyyy-MM-dd}-%i.log
appender.audit.layout.type=PatternLayout
appender.audit.layout.pattern=%d{yyyy-MM-dd HH:mm:ss} | [%t] | %msg%n

appender.audit.policies.type=Policies
appender.audit.policies.time.type=TimeBasedTriggeringPolicy
appender.audit.policies.time.interval=1
appender.audit.policies.time.modulate=true

appender.audit.policies.size.type=SizeBasedTriggeringPolicy
appender.audit.policies.size.size=100MB

appender.audit.strategy.type=DefaultRolloverStrategy
appender.audit.strategy.max=50
appender.audit.strategy.delete.type=Delete
appender.audit.strategy.delete.basePath=${basePath}
appender.audit.strategy.delete.maxDepth=1
appender.audit.strategy.delete.ifLastModified.type=IfLastModified
appender.audit.strategy.delete.ifLastModified.age=90d

# config Root Logger
rootLogger.level=info
rootLogger.appenderRef.stdout.ref=consoleAppender
rootLogger.appenderRef.rolling.ref=fileAppender

# config Hibernate Logger
logger.hibernate.name=org.hibernate.SQL
logger.hibernate.level=debug

# dblogger
logger.audit.name=DatabaseAuditLogger
logger.audit.level=info
logger.audit.additivity=false
logger.audit.appenderRef.audit.ref=auditAppender